<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TennisPro — Analisi Pronostici Tennis</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎾</text></svg>">
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script>
    firebase.initializeApp({
      databaseURL: "https://tennispro-c13f9-default-rtdb.europe-west1.firebasedatabase.app"
    });
    const DB = firebase.database();
  </script>
</head>
<body>
  <header class="header"><div class="header-inner">
    <a href="#" class="logo" onclick="TP.goHome();return false"><div class="logo-icon">🎾</div><div class="logo-text">Tennis<span>Pro</span></div></a>
    <div class="header-right">
      <span class="api-status" id="apiStatus">● DB</span>
      <div class="header-date" id="headerDate"></div>
    </div>
  </div></header>

  <nav class="nav-tabs">
    <button class="nav-tab active" data-tab="matches">📊 Partite</button>
    <button class="nav-tab" data-tab="live">⚡ Live <span class="tab-badge" id="liveCount" style="display:none">0</span></button>
    <button class="nav-tab" data-tab="bankroll">💰 Bankroll</button>
    <button class="nav-tab" data-tab="rankings">🏆 Classifiche</button>
  </nav>

  <main class="main">
    <section class="tab-content active" id="tab-matches">
      <div id="topPicksContainer" style="display:none"></div>
      <div class="section-header">
        <h2 class="section-title"><span class="icon">📊</span> Pronostici del Giorno</h2>
        <div class="date-selector">
          <button class="date-btn" data-offset="-1">Ieri</button>
          <button class="date-btn active" data-offset="0">Oggi</button>
          <button class="date-btn" data-offset="1">Domani</button>
        </div>
      </div>
      <div class="accuracy-bar" id="accuracyBar" style="display:none"></div>
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">Tutti</button>
        <button class="filter-btn" data-filter="atp">ATP</button>
        <button class="filter-btn" data-filter="wta">WTA</button>
        <button class="filter-btn" data-filter="challenger">Challenger</button>
        <button class="filter-btn" data-filter="itf">ITF</button>
      </div>
      <div id="tournamentsContainer"><div class="loading-state"><div class="loading-spinner"></div><p>Caricamento...</p></div></div>
    </section>

    <section class="tab-content" id="tab-analysis"><div id="analysisPage"></div></section>

    <section class="tab-content" id="tab-live">
      <div class="section-header"><h2 class="section-title"><span class="icon">⚡</span> Live Score</h2>
        <div class="filter-bar"><button class="filter-btn active" data-live-filter="all">Tutti</button><button class="filter-btn" data-live-filter="atp">ATP</button><button class="filter-btn" data-live-filter="wta">WTA</button></div>
      </div>
      <div id="liveContainer"><div class="loading-state"><div class="loading-spinner"></div></div></div>
    </section>

    <section class="tab-content" id="tab-bankroll">
      <div class="section-header"><h2 class="section-title"><span class="icon">💰</span> Bankroll Manager</h2></div>
      <div id="bankrollDashboard"></div>
      <div id="bankrollHistory"></div>
    </section>

    <section class="tab-content" id="tab-rankings">
      <div class="section-header"><h2 class="section-title"><span class="icon">🏆</span> Classifiche</h2>
        <div class="filter-bar"><button class="filter-btn active" data-ranking="atp">ATP</button><button class="filter-btn" data-ranking="wta">WTA</button></div>
      </div>
      <div id="rankingsContainer"><div class="loading-state"><div class="loading-spinner"></div></div></div>
    </section>
  </main>

  <footer style="text-align:center;padding:2rem;color:var(--text-dim);font-size:0.72rem;border-top:1px solid var(--border)">
    <p>TennisPro v7.0 — Firebase + 9 Modelli + Pronostici Bloccati</p>
    <p style="margin-top:4px">© 2026 TennisPro · Solo scopo informativo</p>
  </footer>
  <script src="app.js"></script>
</body>
</html>
